{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>{{ title }}</h4>
    <a href="{% url 'service_category_list' %}" class="btn btn-outline-secondary btn-sm">{% trans "Back" %}</a>
</div>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">{% trans "Category Name" %} *</label>
                <input type="text" name="name" class="form-control" value="{{ category.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Code" %} *</label>
                <input type="text" name="code" class="form-control" value="{{ category.code|default:'' }}" required placeholder="e.g. RADIOLOGY, LABORATORY">
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Icon" %}</label>
                <input type="text" name="icon" class="form-control" value="{{ category.icon|default:'bi-tag' }}" placeholder="e.g. bi-heart-pulse">
                <small class="text-muted">Bootstrap Icons class name</small>
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Display Order" %}</label>
                <input type="number" name="order" class="form-control" value="{{ category.order|default:0 }}" min="0">
            </div>
            {% if category %}
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if category.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">{% trans "Active" %}</label>
            </div>
            {% endif %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'service_category_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
                <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
