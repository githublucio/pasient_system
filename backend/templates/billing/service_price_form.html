{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>{{ title }}</h4>
    <a href="{% url 'service_category_list' %}" class="btn btn-outline-secondary btn-sm">{% trans "Back" %}</a>
</div>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">{% trans "Category" %}</label>
                <input type="text" class="form-control" value="{{ category.name }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Service Name" %} *</label>
                <input type="text" name="name" class="form-control" value="{{ service.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Code" %}</label>
                <input type="text" name="code" class="form-control" value="{{ service.code|default:'' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Price (USD)" %} *</label>
                <input type="number" name="price" class="form-control" value="{{ service.price|default:'0.00' }}" min="0" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{% trans "Description" %}</label>
                <textarea name="description" class="form-control" rows="2">{{ service.description|default:'' }}</textarea>
            </div>
            {% if service %}
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if service.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">{% trans "Active" %}</label>
            </div>
            {% endif %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'service_category_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
                <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
